<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transit Colors</title>
    <link rel="preconnect" href="https://tiles.openfreemap.org" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <main class="app-shell">
      <div id="map" aria-label="Transit proximity map"></div>

      <section class="panel" aria-label="Map details">
        <div class="panel-header">
          <div>
            <label class="area-control" for="metro-area">
              <span>Metro area</span>
              <select id="metro-area">
                <option value="cdmx">Mexico City</option>
                <option value="nyc">NYC metro area</option>
              </select>
            </label>
            <h1>Transit Street Gradient</h1>
          </div>
          <span id="status" class="status">Loading</span>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <span class="metric-label">Streets in view</span>
            <strong id="street-count">--</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Stations in view</span>
            <strong id="station-count">--</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Within 2.5 km</span>
            <strong id="near-count">--</strong>
          </div>
        </div>

        <div class="legend" aria-label="Distance legend">
          <div class="legend-bar"></div>
          <div class="legend-labels">
            <span>0 km</span>
            <span>1</span>
            <span>2.5</span>
            <span>5 km</span>
          </div>
        </div>

        <div class="toggles" aria-label="Layer controls">
          <label>
            <input id="toggle-streets" type="checkbox" checked />
            <span>Streets</span>
          </label>
          <label>
            <input id="toggle-stations" type="checkbox" checked />
            <span>Stations</span>
          </label>
          <label>
            <input id="toggle-future-stations" type="checkbox" />
            <span>Future</span>
          </label>
        </div>

        <div id="station-breakdown" class="station-breakdown" aria-label="Station mode counts"></div>

        <div class="selection" aria-live="polite">
          <span id="selection-type" class="metric-label">Selected feature</span>
          <strong id="feature-name">None</strong>
          <span id="feature-summary">Hover a highlighted street or station</span>
          <dl id="feature-metadata" class="feature-metadata"></dl>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
